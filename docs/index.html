<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishAPaw - Legal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #2c3e50;
            background: linear-gradient(135deg, #ffeef8 0%, #e8f4ff 100%);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5em;
            color: #9b87d4;
            margin-bottom: 15px;
        }
        
        .tagline {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
        }
        
        .link-button {
            display: block;
            padding: 20px 30px;
            background: linear-gradient(135deg, #9b87d4 0%, #d4a5d4 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(155, 135, 212, 0.3);
        }
        
        .link-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(155, 135, 212, 0.4);
        }
        
        .link-button:active {
            transform: translateY(0);
        }
        
        .footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
            color: #7f8c8d;
            font-size: 0.9em;
        }
        
        .footer a {
            color: #9b87d4;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .logo {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐾</div>
        <h1>WishAPaw</h1>
        <p class="tagline">A gentle companion for brave kids</p>
        
        <div class="links">
            <a href="privacy-policy.html" class="link-button">
                📄 Privacy Policy
            </a>
            
            <a href="terms-of-service.html" class="link-button">
                📋 Terms of Service
            </a>
        </div>
        
        <div class="footer">
            <p><strong>Contact Us</strong></p>
            <p><a href="mailto:contact.wishapaw@gmail.com">contact.wishapaw@gmail.com</a></p>
            <p style="margin-top: 20px;">Made with 💛 for brave kids everywhere</p>
        </div>
    </div>
</body>
</html>
