<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishAPaw - A gentle companion for medical treatment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #2C2839;
            background: linear-gradient(135deg, #FFF5F7 0%, #F5F0FF 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #9B7EBD;
            font-size: 48px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .tagline {
            text-align: center;
            color: #6B6B82;
            font-size: 20px;
            margin-bottom: 40px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
        }
        
        .link-card {
            display: block;
            padding: 24px;
            background: linear-gradient(135deg, #9B7EBD 0%, #B4A3D6 100%);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }
        
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(155, 126, 189, 0.3);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #6B6B82;
            font-size: 14px;
        }
        
        .app-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #9B7EBD 0%, #FFB5C5 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }
            
            h1 {
                font-size: 36px;
            }
            
            .tagline {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">🐾</div>
        <h1>WishAPaw</h1>
        <p class="tagline">A gentle companion that helps children navigate medical treatment with courage and confidence.</p>
        
        <div class="links">
            <a href="privacy.html" class="link-card">Privacy Policy</a>
            <a href="terms.html" class="link-card">Terms of Service</a>
        </div>
        
        <div class="footer">
            <p>Contact: <a href="mailto:contact.wishapaw@gmail.com" style="color: #9B7EBD;">contact.wishapaw@gmail.com</a></p>
            <p style="margin-top: 8px;">© 2026 WishAPaw. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
